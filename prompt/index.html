  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0A0A0A;
      --term-bg: #0E0E10;
      --term-head: #161618;
      --accent: #E8FF00;
      --red: #FF3C5F;
      --green: #3DFA8B;
      --text: #F5F5F5;
      --muted: #8A8A8A;
      --border: #242427;
      --font-display: 'Space Grotesk', sans-serif;
      --font-body: 'Inter', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      min-height: 100vh;
      padding: 40px 20px 64px;
      background-image:
        linear-gradient(rgba(232,255,0,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(232,255,0,0.025) 1px, transparent 1px);
      background-size: 48px 48px;
    }

    .wrap { max-width: 920px; margin: 0 auto; }

    /* TOP BAR */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
      flex-wrap: wrap;
      gap: 16px;
    }
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.25s ease;
    }
    .back-link:hover { color: var(--accent); }

    .tag {
      font-family: var(--font-display);
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
    }

    /* TERMINAL */
    .terminal {
      background: var(--term-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 24px 70px rgba(0,0,0,0.55), 0 0 0 1px rgba(232,255,0,0.04);
    }

    .term-head {
      display: flex;
      align-items: center;
      gap: 14px;
      background: var(--term-head);
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
    }
    .dots { display: flex; gap: 8px; }
    .dot { width: 12px; height: 12px; border-radius: 50%; }
    .dot.r { background: #FF5F56; }
    .dot.y { background: #FFBD2E; }
    .dot.g { background: #27C93F; }
    .term-title {
      flex: 1;
      text-align: center;
      font-family: var(--font-mono);
      font-size: 0.82rem;
      color: var(--muted);
    }
    .term-title .accent { color: var(--accent); }

    .copy-btn {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: var(--muted);
      background: transparent;
      border: 1px solid var(--border);
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.25s ease;
      white-space: nowrap;
    }
    .copy-btn:hover { color: var(--accent); border-color: var(--accent); }
    .copy-btn.done { color: var(--green); border-color: var(--green); }

    .term-body {
      display: flex;
      max-height: 72vh;
      overflow: auto;
      font-family: var(--font-mono);
      font-size: 0.84rem;
      line-height: 1.7;
    }

    /* line numbers gutter */
    .gutter {
      flex-shrink: 0;
      padding: 22px 0 22px;
      text-align: right;
      color: #44444A;
      user-select: none;
      border-right: 1px solid var(--border);
      background: rgba(255,255,255,0.012);
    }
    .gutter span { display: block; padding: 0 16px; }

    .code {
      flex: 1;
      padding: 22px 22px 22px 20px;
      white-space: pre-wrap;
      word-break: break-word;
      color: #D6D6D6;
      tab-size: 2;
    }
    .code .prompt-sign { color: var(--accent); }

    /* prompt body coloring via simple classes */
    .ln-h1 { color: var(--accent); font-weight: 600; }
    .ln-h2 { color: var(--red); font-weight: 600; }
    .ln-h3 { color: #6FB3FF; font-weight: 600; }
    .ln-comment { color: #5C5C62; }
    .ln-rule { color: #303036; }

    /* scrollbar */
    .term-body::-webkit-scrollbar { width: 10px; height: 10px; }
    .term-body::-webkit-scrollbar-track { background: var(--term-bg); }
    .term-body::-webkit-scrollbar-thumb { background: #2C2C30; border-radius: 6px; }
    .term-body::-webkit-scrollbar-thumb:hover { background: #3A3A40; }

    .footer-note {
      margin-top: 24px;
      text-align: center;
      font-size: 0.8rem;
      color: var(--muted);
    }
    .footer-note span { color: var(--accent); }

    @media (max-width: 640px) {
      body { padding: 24px 12px 48px; }
      .term-body { font-size: 0.76rem; }
      .gutter span { padding: 0 10px; }
      .code { padding: 18px 14px; }
      .term-title { display: none; }
    }
  </style>
</head>

<code id="code"></code></pre>

## ROL Y CONTEXTO

Eres un desarrollador web frontend senior especializado en diseño visual de alto impacto. Tu tarea es crear una Landing Page completa, moderna y funcional para "SONORA BCN", una academia de música contemporánea ubicada en el barrio de Palermo, Buenos Aires, Argentina. La academia ofrece clases de guitarra eléctrica, producción musical, canto, batería y piano. Su público objetivo son jóvenes y adultos de 15 a 40 años con pasión por la música urbana, el rock, el pop y la música electrónica.

## TAREA PRINCIPAL

Genera un único archivo HTML autocontenido (`index.html`) con CSS embebido en la etiqueta `<style>` y JavaScript mínimo embebido en la etiqueta `<script>`. No uses frameworks externos ni librerías adicionales salvo Google Fonts. El resultado debe ser una Landing Page completa, responsive (mobile-first), visualmente memorable y lista para producción.

## REQUISITOS TÉCNICOS OBLIGATORIOS

1. **Un solo archivo**: Todo en `index.html`. Sin archivos externos excepto Google Fonts vía `<link>`.
2. **Responsive**: Mobile-first. Breakpoints: 768px (tablet), 1024px (desktop). Usa CSS Grid y Flexbox.
3. **Smooth scroll**: `scroll-behavior: smooth` en el html y navegación funcional con anclas `#section`.
4. **Menú hamburguesa**: Funcional en mobile con toggle de clase CSS via JavaScript vanilla.
5. **Header sticky**: Cambia opacidad/background al hacer scroll (JS con `window.addEventListener('scroll', ...)`).
6. **Animación de entrada**: Las secciones aparecen con fade-in al entrar en viewport (IntersectionObserver).
7. **Hover states**: Todos los botones e íconos tienen transiciones suaves (`transition: all 0.3s ease`).
8. **Accesibilidad**: Usa atributos `alt`, `aria-label` donde corresponda. Contraste AA mínimo.
9. **Meta tags**: Incluye `<meta name="description">` y `<meta name="viewport">`.
10. **Sin errores**: El HTML debe ser semánticamente correcto. Usa `<header>`, `<nav>`, `<main>`, `<section>`, `<footer>`.

---

## RESTRICCIONES EXPLÍCITAS

- NO uses Bootstrap, Tailwind, jQuery ni ningún framework CSS o JS.
- NO uses imágenes externas (usa gradientes, SVGs inline y elementos CSS puros).
- NO dejes secciones vacías ni con placeholder como "Lorem ipsum".
- NO uses border-radius mayor a 4px en elementos principales (estética sharp).
- NO uses colores fuera de la paleta definida salvo variaciones de opacidad.

---

## OUTPUT ESPERADO

Entrega únicamente el código completo del archivo `index.html`, comenzando con `<!DOCTYPE html>` y terminando con `</html>`. Sin explicaciones adicionales, sin bloques de código Markdown. Solo el HTML puro y completo.
</script>

  <script>
    (function () {
      var raw = document.getElementById('promptSrc').textContent.replace(/^\n/, '').replace(/\s+$/, '');
      var lines = raw.split('\n');
      var codeEl = document.getElementById('code');
      var gutterEl = document.getElementById('gutter');

      function classFor(line) {
        var t = line.trim();
        if (t.indexOf('### ') === 0) return 'ln-h3';
        if (t.indexOf('## ') === 0) return 'ln-h2';
        if (t.indexOf('# ') === 0 && t.indexOf('##') !== 0) return 'ln-h1';
        if (t === '---') return 'ln-rule';
        return '';
      }

      // Spacer en el gutter para alinear con la línea de comando "$ cat prompt.txt"
      var spacer = document.createElement('span');
      spacer.textContent = '\u00A0';
      gutterEl.appendChild(spacer);

      var frag = document.createDocumentFragment();
      lines.forEach(function (line, i) {
        var span = document.createElement('span');
        var cls = classFor(line);
        if (cls) span.className = cls;
        span.textContent = line.length ? line : '\u00A0';
        frag.appendChild(span);
        frag.appendChild(document.createTextNode('\n'));

        var g = document.createElement('span');
        g.textContent = (i + 1);
        gutterEl.appendChild(g);
      });
      codeEl.appendChild(frag);

      // Copy to clipboard
      var btn = document.getElementById('copyBtn');
      btn.addEventListener('click', function () {
        navigator.clipboard.writeText(raw).then(function () {
          btn.textContent = '✓ Copiado';
          btn.classList.add('done');
          setTimeout(function () { btn.textContent = '📋 Copiar'; btn.classList.remove('done'); }, 2200);
        });
      });
    })();
  </script>
